<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radioband — WebUSB SDR</title>
  
<script type="module">
import init, * as bindings from '/radioband/app-ui.js';
const wasm = await init({ module_or_path: '/radioband/app-ui_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
  <link rel="stylesheet" href="/radioband/style.css"/>
  
  
  
<link rel="modulepreload" href="/radioband/app-ui.js" crossorigin="anonymous"><link rel="preload" href="/radioband/app-ui_bg.wasm" crossorigin="anonymous" as="fetch" type="application/wasm"></head>

<body>
  <div id="app">
    <noscript>This application requires JavaScript and WebAssembly.</noscript>
  </div>
</body>

</html>
